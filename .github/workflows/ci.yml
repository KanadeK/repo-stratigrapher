name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build
      - run: npm run package
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-stratigrapher-test-artifacts
          path: |
            coverage/
            playwright-report/
            dist-release/
